version: "2"

linters:
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - exhaustive
    - exptostd
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - modernize
    - nilerr
    - revive
    - staticcheck
    - testifylint
    - unparam
    - unused
  exclusions:
    rules:
      - path: examples/
        linters:
          - revive
        text: "package-comments"
      - linters:
          - revive
        text: "var-naming: avoid meaningless package names"

formatters:
  enable:
    - gofumpt

run:
  tests: false
  timeout: 1m

output:
  formats:
    text:
      path: stdout
      color: true
      print-linter-name: true
      print-issued-lines: true
