name: XRPL-GO Lint and Test
on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
jobs:
  build:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: "1.24"
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.3

      - name: Run linter.
        run: make lint

      - name: Run tests
        run: make test-ci
