name: Coverage
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]
permissions:
  contents: read
jobs:
  build:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.12"
          cache: true

      - name: Generate unit test coverage
        run: make coverage-unit

      - name: Check unit test coverage
        uses: vladopajic/go-test-coverage@8cfd056d3bc5cc2bc64a840ded0c907aaae3dc46 # v2.18.7
        with:
          # Configure action using config file (option 1)
          config: ./.testcoverage.yml
          
          # Configure action by specifying input parameters individually (option 2).
          # If you are using config file (option 1) you shouldn't use these parameters, however
          # specifing these action parameters will override appropriate config values.
          profile: coverage.out
          local-prefix: github.com/Peersyst/xrpl-go
          threshold-file: 0
          threshold-package: 0
          threshold-total: 0
